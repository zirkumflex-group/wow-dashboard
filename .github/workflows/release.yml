name: Release

on:
  push:
    branches:
      - master
    paths:
      - "apps/app/**"
      - "apps/addon/**"

permissions:
  contents: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      addon: ${{ steps.filter.outputs.addon }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/app/**'
            addon:
              - 'apps/addon/**'

  release-app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Clean install state
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item node_modules -Recurse -Force
          }
          pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Debug Rollup native package
        shell: pwsh
        run: |
          pnpm why @rollup/rollup-win32-x64-msvc
          Test-Path "node_modules/.pnpm/@rollup+rollup-win32-x64-msvc@4.59.0/node_modules/@rollup/rollup-win32-x64-msvc"

      - name: Create .env file
        shell: bash
        run: |
          echo "VITE_CONVEX_URL=${{ secrets.VITE_CONVEX_URL }}" > apps/app/.env
          echo "VITE_CONVEX_SITE_URL=${{ secrets.VITE_CONVEX_SITE_URL }}" >> apps/app/.env
          echo "VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}" >> apps/app/.env

      - name: Build app (electron-vite)
        run: pnpm --filter app build

      - name: Package app (electron-builder)
        run: pnpm --filter app package

      - name: Compute release tag
        id: release_tag
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=build-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Build ${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.name }}
          files: apps/app/dist/wow-dashboard.exe
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-addon:
    needs: changes
    if: needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package addon
        run: |
          ADDON_NAME="wow-dashboard"
          OUT_DIR="apps/addon/dist/${ADDON_NAME}"
          mkdir -p "${OUT_DIR}"
          cp "apps/addon/${ADDON_NAME}.toc" "${OUT_DIR}/"
          cp "apps/addon/${ADDON_NAME}.lua" "${OUT_DIR}/"
          for dir in Art Fonts; do
            if [ -d "apps/addon/${dir}" ]; then
              cp -r "apps/addon/${dir}" "${OUT_DIR}/${dir}"
            fi
          done
          cd apps/addon/dist
          zip -r "${ADDON_NAME}.zip" "${ADDON_NAME}/"
          echo "ZIP=apps/addon/dist/${ADDON_NAME}.zip" >> $GITHUB_ENV

      - name: Compute release tag
        id: release_tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=build-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Build ${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.name }}
          files: ${{ env.ZIP }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
