name: Release

on:
  push:
    branches:
      - master
    paths:
      - "apps/app/**"
      - "apps/app-tauri/**"
      - "apps/addon/**"
      - "packages/api-client/**"
      - "packages/api-schema/**"
      - "packages/config/**"
      - "packages/env/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm run check

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      addon: ${{ steps.filter.outputs.addon }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'apps/app-tauri/**'
              - 'packages/api-client/**'
              - 'packages/api-schema/**'
              - 'packages/config/**'
              - 'packages/env/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            addon:
              - 'apps/addon/**'

  bump-versions:
    needs: [check, changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.bump.outputs.app_version }}
      addon_version: ${{ steps.bump.outputs.addon_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions
        id: bump
        env:
          APP_CHANGED: ${{ needs.changes.outputs.app }}
          ADDON_CHANGED: ${{ needs.changes.outputs.addon }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          bump_semver() {
            local CURRENT=$1
            local SCOPE=$2   # e.g. "apps/app/ packages/"
            local TAG_PATTERN=$3  # e.g. "app-v*"

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            LAST_TAG=$(git describe --tags --match "$TAG_PATTERN" --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline -- $SCOPE)
            else
              COMMITS=$(git log --oneline -- $SCOPE)
            fi

            if echo "$COMMITS" | grep -qiE "[[:space:]]feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          if [ "$APP_CHANGED" = "true" ]; then
            CURRENT=$(node -p "require('./apps/app-tauri/package.json').version")
            APP_VERSION=$(bump_semver "$CURRENT" "apps/app/ apps/app-tauri/ packages/api-client/ packages/api-schema/ packages/config/ packages/env/ packages/ui/ package.json pnpm-lock.yaml pnpm-workspace.yaml" "app-v*")
            # Keep the legacy Electron metadata and new Tauri metadata aligned while both apps exist.
            node -e "
              const fs = require('fs');
              const updateJson = (path, update) => {
                if (!fs.existsSync(path)) return;
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                update(data);
                fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
              };
              updateJson('./apps/app/package.json', (pkg) => { pkg.version = '${APP_VERSION}'; });
              updateJson('./apps/app-tauri/package.json', (pkg) => { pkg.version = '${APP_VERSION}'; });
              updateJson('./apps/app-tauri/src-tauri/tauri.conf.json', (config) => {
                config.version = '${APP_VERSION}';
              });
              const cargoTomlPath = './apps/app-tauri/src-tauri/Cargo.toml';
              if (fs.existsSync(cargoTomlPath)) {
                const raw = fs.readFileSync(cargoTomlPath, 'utf8');
                fs.writeFileSync(cargoTomlPath, raw.replace(/^version = \".*\"$/m, 'version = \"${APP_VERSION}\"'));
              }
              const cargoLockPath = './apps/app-tauri/src-tauri/Cargo.lock';
              if (fs.existsSync(cargoLockPath)) {
                const raw = fs.readFileSync(cargoLockPath, 'utf8');
                fs.writeFileSync(
                  cargoLockPath,
                  raw.replace(
                    /(name = \"app-tauri\"\\nversion = \").*(\")/,
                    (_match, prefix, suffix) => prefix + '${APP_VERSION}' + suffix,
                  ),
                );
              }
            "
            echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped app to ${APP_VERSION}"
          fi

          if [ "$ADDON_CHANGED" = "true" ]; then
            CURRENT=$(grep "^## Version:" apps/addon/wow-dashboard.toc | awk '{print $3}')
            ADDON_VERSION=$(bump_semver "$CURRENT" "apps/addon/" "addon-v*")
            sed -i "s/^## Version:.*$/## Version: ${ADDON_VERSION}/" apps/addon/wow-dashboard.toc
            echo "addon_version=${ADDON_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped addon to ${ADDON_VERSION}"
          fi

          # Commit only if there are staged changes
          git add \
            apps/app/package.json \
            apps/app-tauri/package.json \
            apps/app-tauri/src-tauri/Cargo.toml \
            apps/app-tauri/src-tauri/Cargo.lock \
            apps/app-tauri/src-tauri/tauri.conf.json \
            apps/addon/wow-dashboard.toc \
            2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump versions [skip ci]"
            git push origin HEAD:master
          fi

          # Push version tags
          if [ -n "$APP_VERSION" ]; then
            git tag "app-v${APP_VERSION}"
          fi
          if [ -n "$ADDON_VERSION" ]; then
            git tag "addon-v${ADDON_VERSION}"
          fi
          git push --tags

  release-app:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Clean install state
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item node_modules -Recurse -Force
          }
          pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Package app (Tauri)
        shell: pwsh
        env:
          SITE_URL: ${{ secrets.VITE_SITE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $siteUrl = $env:SITE_URL.TrimEnd("/")
          $env:VITE_SITE_URL = $siteUrl
          $env:VITE_API_URL = "$siteUrl/api"
          pnpm --filter app-tauri package

      - name: Prepare Tauri updater release assets
        id: tauri-assets
        shell: pwsh
        run: |
          $version = "${{ needs.bump-versions.outputs.app_version }}"
          $bundleDir = "apps/app-tauri/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $installer = Get-ChildItem $bundleDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw "No Tauri NSIS installer found in $bundleDir"
          }
          $sourceSignature = "$($installer.FullName).sig"
          if (-not (Test-Path $sourceSignature)) {
            throw "No Tauri updater signature found at $sourceSignature"
          }

          $releaseDir = "apps/app-tauri/dist-release"
          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          $installerOut = Join-Path $releaseDir "wow-dashboard.exe"
          $signatureOut = Join-Path $releaseDir "wow-dashboard.exe.sig"
          $latestOut = Join-Path $releaseDir "latest.json"

          Copy-Item $installer.FullName $installerOut -Force
          Copy-Item $sourceSignature $signatureOut -Force
          $signature = (Get-Content $signatureOut -Raw).Trim()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/app-v$version/wow-dashboard.exe"
          $latest = [ordered]@{
            version = $version
            notes = "WoW Dashboard desktop uploader v$version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }
          $latest | ConvertTo-Json -Depth 8 | Set-Content -Path $latestOut -Encoding UTF8

          "installer=$installerOut" >> $env:GITHUB_OUTPUT
          "signature=$signatureOut" >> $env:GITHUB_OUTPUT
          "latest=$latestOut" >> $env:GITHUB_OUTPUT

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.bump-versions.outputs.app_version }}
          name: App v${{ needs.bump-versions.outputs.app_version }}
          prerelease: false
          make_latest: true
          files: |
            ${{ steps.tauri-assets.outputs.installer }}
            ${{ steps.tauri-assets.outputs.signature }}
            ${{ steps.tauri-assets.outputs.latest }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        shell: bash
        run: |
          VERSION="${{ needs.bump-versions.outputs.app_version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/app-v${VERSION}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL_APP }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**WoW Dashboard App v${VERSION}** has been released! :tada:\n${RELEASE_URL}\"}"

  release-addon:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Package addon
        run: |
          ADDON_NAME="wow-dashboard"
          OUT_DIR="apps/addon/dist/${ADDON_NAME}"
          mkdir -p "${OUT_DIR}"
          cp "apps/addon/${ADDON_NAME}.toc" "${OUT_DIR}/"
          cp apps/addon/*.lua "${OUT_DIR}/"
          for dir in Art Fonts; do
            if [ -d "apps/addon/${dir}" ]; then
              cp -r "apps/addon/${dir}" "${OUT_DIR}/${dir}"
            fi
          done
          toc_lua_files="$(mktemp)"
          awk 'NF && $1 !~ /^##/ && $1 ~ /\.lua$/ { print $1 }' "${OUT_DIR}/${ADDON_NAME}.toc" > "${toc_lua_files}"
          while IFS= read -r file; do
            if [ ! -f "${OUT_DIR}/${file}" ]; then
              echo "Missing addon file listed in TOC: ${file}" >&2
              exit 1
            fi
          done < "${toc_lua_files}"
          rm -f "${toc_lua_files}"
          cd apps/addon/dist
          zip -r "${ADDON_NAME}.zip" "${ADDON_NAME}/"
          sha256sum "${ADDON_NAME}.zip" > "${ADDON_NAME}.zip.sha256"
          echo "ZIP=apps/addon/dist/${ADDON_NAME}.zip" >> $GITHUB_ENV
          echo "CHECKSUM=apps/addon/dist/${ADDON_NAME}.zip.sha256" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: addon-v${{ needs.bump-versions.outputs.addon_version }}
          name: Addon v${{ needs.bump-versions.outputs.addon_version }}
          prerelease: false
          make_latest: false
          files: |
            ${{ env.ZIP }}
            ${{ env.CHECKSUM }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
