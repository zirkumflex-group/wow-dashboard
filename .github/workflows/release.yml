name: Release

on:
  push:
    branches:
      - master
    paths:
      - "apps/app/**"
      - "apps/addon/**"
      - "packages/config/**"
      - "packages/mythic-plus/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: wow-dashboard-release-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua 5.4
        run: sudo apt-get update && sudo apt-get install -y lua5.4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm run check

      - name: Run desktop updater tests
        run: pnpm --filter app test

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      addon: ${{ steps.filter.outputs.addon }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/config/**'
              - 'packages/mythic-plus/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            addon:
              - 'apps/addon/**'

  bump-versions:
    needs: [check, changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.bump.outputs.app_version }}
      addon_version: ${{ steps.bump.outputs.addon_version }}
      release_sha: ${{ steps.release_commit.outputs.sha }}

    steps:
      - name: Checkout triggering revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions
        id: bump
        env:
          APP_CHANGED: ${{ needs.changes.outputs.app }}
          ADDON_CHANGED: ${{ needs.changes.outputs.addon }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          bump_semver() {
            local CURRENT=$1
            local SCOPE=$2
            local TAG_PATTERN=$3

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            LAST_TAG=$(git describe --tags --match "$TAG_PATTERN" --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline -- $SCOPE)
            else
              COMMITS=$(git log --oneline -- $SCOPE)
            fi

            if echo "$COMMITS" | grep -qiE "[[:space:]]feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          if [ "$APP_CHANGED" = "true" ]; then
            CURRENT=$(node -p "require('./apps/app/package.json').version")
            APP_VERSION=$(bump_semver "$CURRENT" "apps/app/ packages/config/ packages/mythic-plus/ package.json pnpm-lock.yaml pnpm-workspace.yaml" "app-v*")
            APP_VERSION="$APP_VERSION" node -e '
              const fs = require("fs");
              const pkg = JSON.parse(fs.readFileSync("./apps/app/package.json", "utf8"));
              pkg.version = process.env.APP_VERSION;
              fs.writeFileSync("./apps/app/package.json", JSON.stringify(pkg, null, 2) + "\n");
            '
            echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped app to ${APP_VERSION}"
          fi

          if [ "$ADDON_CHANGED" = "true" ]; then
            CURRENT=$(grep "^## Version:" apps/addon/wow-dashboard.toc | awk '{print $3}')
            ADDON_VERSION=$(bump_semver "$CURRENT" "apps/addon/" "addon-v*")
            sed -i "s/^## Version:.*$/## Version: ${ADDON_VERSION}/" apps/addon/wow-dashboard.toc
            echo "addon_version=${ADDON_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped addon to ${ADDON_VERSION}"
          fi

          git add apps/app/package.json apps/addon/wow-dashboard.toc
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump versions [skip ci]"
            git push origin HEAD:master
          fi

      - name: Capture immutable release revision
        id: release_commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release-app:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout immutable release revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-versions.outputs.release_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Clean install state
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item node_modules -Recurse -Force
          }
          pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Create app environment
        shell: pwsh
        env:
          SITE_URL: ${{ secrets.VITE_SITE_URL }}
        run: |
          $siteUrl = $env:SITE_URL.TrimEnd('/')
          @(
            "VITE_SITE_URL=$siteUrl"
            "VITE_API_URL=$siteUrl/api"
          ) | Set-Content -Path apps/app/.env -Encoding utf8

      - name: Check Windows signing configuration
        id: signing
        shell: pwsh
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:CSC_LINK)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)
          if ($hasCertificate -xor $hasPassword) {
            throw "WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD must be configured together"
          }
          if ($hasCertificate) {
            "enabled=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Warning "Authenticode secrets are not configured; publishing an unsigned installer"
            "enabled=false" >> $env:GITHUB_OUTPUT
          }

      - name: Build app
        run: pnpm --filter app build

      - name: Package app
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ('${{ steps.signing.outputs.enabled }}' -eq 'true') {
            pnpm --filter app exec electron-builder --win --config.forceCodeSigning=true
          } else {
            pnpm --filter app exec electron-builder --win
          }

      - name: Verify signed installer
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature apps/app/dist/wow-dashboard.exe
          if ($signature.Status -ne 'Valid') {
            throw "Installer signature is not valid: $($signature.Status)"
          }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.bump-versions.outputs.app_version }}
          name: App v${{ needs.bump-versions.outputs.app_version }}
          target_commitish: ${{ needs.bump-versions.outputs.release_sha }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            apps/app/dist/wow-dashboard.exe
            apps/app/dist/wow-dashboard.exe.blockmap
            apps/app/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_APP }}
          VERSION: ${{ needs.bump-versions.outputs.app_version }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/app-v${VERSION}"
          curl --fail-with-body --silent --show-error -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**WoW Dashboard App v${VERSION}** has been released! :tada:\\n${RELEASE_URL}\"}"

  release-addon:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout immutable release revision
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-versions.outputs.release_sha }}

      - name: Package addon
        run: |
          ADDON_NAME="wow-dashboard"
          OUT_DIR="apps/addon/dist/${ADDON_NAME}"
          mkdir -p "${OUT_DIR}"
          cp "apps/addon/${ADDON_NAME}.toc" "${OUT_DIR}/"
          while IFS= read -r file; do
            normalized="${file//\\//}"
            if [[ "$normalized" =~ ^[A-Za-z]: ]] || [[ "/$normalized/" == *"/../"* ]] || [[ "/$normalized/" == *"/./"* ]]; then
              echo "Unsafe addon file listed in TOC: ${file}" >&2
              exit 1
            fi
            source_file="apps/addon/${normalized}"
            target_file="${OUT_DIR}/${normalized}"
            if [ ! -f "$source_file" ]; then
              echo "Missing addon file listed in TOC: ${file}" >&2
              exit 1
            fi
            mkdir -p "$(dirname "$target_file")"
            cp "$source_file" "$target_file"
          done < <(awk 'NF && $1 !~ /^#/ { sub(/^[[:space:]]+/, ""); sub(/[[:space:]]+$/, ""); print }' "apps/addon/${ADDON_NAME}.toc")
          for dir in Art Fonts; do
            if [ -d "apps/addon/${dir}" ]; then
              cp -r "apps/addon/${dir}" "${OUT_DIR}/${dir}"
            fi
          done
          cd apps/addon/dist
          zip -r "${ADDON_NAME}.zip" "${ADDON_NAME}/"
          sha256sum "${ADDON_NAME}.zip" > "${ADDON_NAME}.zip.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: addon-v${{ needs.bump-versions.outputs.addon_version }}
          name: Addon v${{ needs.bump-versions.outputs.addon_version }}
          target_commitish: ${{ needs.bump-versions.outputs.release_sha }}
          prerelease: false
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            apps/addon/dist/wow-dashboard.zip
            apps/addon/dist/wow-dashboard.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_ADDON }}
          VERSION: ${{ needs.bump-versions.outputs.addon_version }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/addon-v${VERSION}"
          curl --fail-with-body --silent --show-error -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**WoW Dashboard Addon v${VERSION}** has been released! :tada:\\n${RELEASE_URL}\"}"
