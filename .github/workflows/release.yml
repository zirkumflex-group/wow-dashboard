name: Release

on:
  push:
    branches:
      - master
    paths:
      - "apps/app/**"
      - "apps/addon/**"
      - "packages/api-client/**"
      - "packages/api-schema/**"
      - "packages/config/**"
      - "packages/env/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm run check

  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      addon: ${{ steps.filter.outputs.addon }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/api-client/**'
              - 'packages/api-schema/**'
              - 'packages/config/**'
              - 'packages/env/**'
              - 'packages/ui/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            addon:
              - 'apps/addon/**'

  bump-versions:
    needs: [check, changes]
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.bump.outputs.app_version }}
      addon_version: ${{ steps.bump.outputs.addon_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump versions
        id: bump
        env:
          APP_CHANGED: ${{ needs.changes.outputs.app }}
          ADDON_CHANGED: ${{ needs.changes.outputs.addon }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          bump_semver() {
            local CURRENT=$1
            local SCOPE=$2   # e.g. "apps/app/ packages/"
            local TAG_PATTERN=$3  # e.g. "app-v*"

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            LAST_TAG=$(git describe --tags --match "$TAG_PATTERN" --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline -- $SCOPE)
            else
              COMMITS=$(git log --oneline -- $SCOPE)
            fi

            if echo "$COMMITS" | grep -qiE "[[:space:]]feat(\(.+\))?:"; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            echo "${MAJOR}.${MINOR}.${PATCH}"
          }

          if [ "$APP_CHANGED" = "true" ]; then
            CURRENT=$(node -p "require('./apps/app/package.json').version")
            APP_VERSION=$(bump_semver "$CURRENT" "apps/app/ packages/api-client/ packages/api-schema/ packages/config/ packages/env/ packages/ui/ package.json pnpm-lock.yaml pnpm-workspace.yaml" "app-v*")
            # Update package.json version
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('./apps/app/package.json', 'utf8'));
              pkg.version = '${APP_VERSION}';
              fs.writeFileSync('./apps/app/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped app to ${APP_VERSION}"
          fi

          if [ "$ADDON_CHANGED" = "true" ]; then
            CURRENT=$(grep "^## Version:" apps/addon/wow-dashboard.toc | awk '{print $3}')
            ADDON_VERSION=$(bump_semver "$CURRENT" "apps/addon/" "addon-v*")
            sed -i "s/^## Version:.*$/## Version: ${ADDON_VERSION}/" apps/addon/wow-dashboard.toc
            echo "addon_version=${ADDON_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Bumped addon to ${ADDON_VERSION}"
          fi

          # Commit only if there are staged changes
          git add apps/app/package.json apps/addon/wow-dashboard.toc 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: bump versions [skip ci]"
            git push origin HEAD:master
          fi

          # Push version tags
          if [ -n "$APP_VERSION" ]; then
            git tag "app-v${APP_VERSION}"
          fi
          if [ -n "$ADDON_VERSION" ]; then
            git tag "addon-v${ADDON_VERSION}"
          fi
          git push --tags

  release-app:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Clean install state
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item node_modules -Recurse -Force
          }
          pnpm store prune

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --force

      - name: Create .env file
        shell: bash
        run: |
          SITE_URL="${{ secrets.VITE_SITE_URL }}"
          SITE_URL="${SITE_URL%/}"
          {
            echo "VITE_SITE_URL=${SITE_URL}"
            echo "VITE_API_URL=${SITE_URL}/api"
          } > apps/app/.env

      - name: Build app (electron-vite)
        run: pnpm --filter app build

      - name: Package app (electron-builder)
        run: pnpm --filter app package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ needs.bump-versions.outputs.app_version }}
          name: App v${{ needs.bump-versions.outputs.app_version }}
          prerelease: false
          files: |
            apps/app/dist/wow-dashboard.exe
            apps/app/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Discord
        shell: bash
        run: |
          VERSION="${{ needs.bump-versions.outputs.app_version }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/app-v${VERSION}"
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL_APP }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**WoW Dashboard App v${VERSION}** has been released! :tada:\n${RELEASE_URL}\"}"

  release-addon:
    needs: [bump-versions, changes]
    if: needs.changes.outputs.addon == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Package addon
        run: |
          ADDON_NAME="wow-dashboard"
          OUT_DIR="apps/addon/dist/${ADDON_NAME}"
          mkdir -p "${OUT_DIR}"
          cp "apps/addon/${ADDON_NAME}.toc" "${OUT_DIR}/"
          cp "apps/addon/${ADDON_NAME}.lua" "${OUT_DIR}/"
          for dir in Art Fonts; do
            if [ -d "apps/addon/${dir}" ]; then
              cp -r "apps/addon/${dir}" "${OUT_DIR}/${dir}"
            fi
          done
          cd apps/addon/dist
          zip -r "${ADDON_NAME}.zip" "${ADDON_NAME}/"
          sha256sum "${ADDON_NAME}.zip" > "${ADDON_NAME}.zip.sha256"
          echo "ZIP=apps/addon/dist/${ADDON_NAME}.zip" >> $GITHUB_ENV
          echo "CHECKSUM=apps/addon/dist/${ADDON_NAME}.zip.sha256" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: addon-v${{ needs.bump-versions.outputs.addon_version }}
          name: Addon v${{ needs.bump-versions.outputs.addon_version }}
          prerelease: false
          files: |
            ${{ env.ZIP }}
            ${{ env.CHECKSUM }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
