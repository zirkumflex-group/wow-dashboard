name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/verify.yml

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production

    env:
      SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST }}
      SSH_USER: ${{ secrets.PRODUCTION_SSH_USER }}
      SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
      HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL || 'https://wow.zirkumflex.io/readyz' }}

    steps:
      - name: Validate deployment secrets
        run: |
          missing=0
          for name in SSH_HOST SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required production deployment secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/production_deploy_key
          chmod 600 ~/.ssh/production_deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on VPS
        run: |
          ssh \
            -i ~/.ssh/production_deploy_key \
            -p "$SSH_PORT" \
            -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" \
            'cd ~/wow-dashboard && bash deploy/update-server.sh'

      - name: Check production health
        run: |
          for attempt in {1..12}; do
            if curl --fail-with-body --silent --show-error "$HEALTH_URL"; then
              exit 0
            fi
            if [ "$attempt" -lt 12 ]; then
              echo "Production is not ready yet; retrying in 5 seconds (${attempt}/12)."
              sleep 5
            fi
          done
          echo "Production readiness check failed after 12 attempts." >&2
          exit 1
