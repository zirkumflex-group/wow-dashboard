name: Deploy Production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/verify.yml

  deploy:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: write

    env:
      HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL || 'https://wow.zirkumflex.io/readyz' }}

    steps:
      - name: Checkout requested revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Request Beeroot deployment
        env:
          DEPLOY_HMAC_KEY: ${{ secrets.PRODUCTION_DEPLOY_HMAC_KEY }}
        run: |
          payload="v1:${GITHUB_REPOSITORY}:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:${GITHUB_SHA}"
          signature="$(PAYLOAD="$payload" python3 - <<'PY'
          import hashlib
          import hmac
          import os

          key_hex = os.environ.get("DEPLOY_HMAC_KEY", "").strip()
          if len(key_hex) != 64:
              raise SystemExit("PRODUCTION_DEPLOY_HMAC_KEY must contain 32 bytes encoded as hex")

          try:
              key = bytes.fromhex(key_hex)
          except ValueError as error:
              raise SystemExit("PRODUCTION_DEPLOY_HMAC_KEY is not valid hex") from error

          print(hmac.new(key, os.environ["PAYLOAD"].encode(), hashlib.sha256).hexdigest())
          PY
          )"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag --force --annotate production-deploy-request \
            --message "wow-dashboard-deploy-request:${payload}:${signature}" \
            "$GITHUB_SHA"
          git push --force origin refs/tags/production-deploy-request

      - name: Wait for requested revision
        run: |
          for attempt in {1..120}; do
            response="$(curl --fail-with-body --silent --show-error "$HEALTH_URL" || true)"
            revision="$(jq -r '.revision // empty' <<<"$response" 2>/dev/null || true)"

            if [ "$revision" = "$GITHUB_SHA" ]; then
              echo "Beeroot deployed revision $revision."
              curl --fail-with-body --silent --show-error "$HEALTH_URL"
              exit 0
            fi

            if [ "$attempt" -lt 120 ]; then
              echo "Beeroot has not reported the requested revision yet (${attempt}/120)."
              sleep 5
            fi
          done
          echo "Beeroot did not deploy the requested main revision within 10 minutes." >&2
          exit 1
