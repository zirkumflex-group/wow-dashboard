# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      run: pnpm oxlint --fix {staged_files}
      stage_fixed: true
    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx,cjs,mjs}"
      run: pnpm oxfmt --write {staged_files}
      stage_fixed: true
