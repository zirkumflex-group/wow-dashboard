services:
  postgres:
    image: postgres:16-alpine
    container_name: wow-dashboard-postgres-dev
    environment:
      POSTGRES_DB: wowdash
      POSTGRES_USER: wowdash
      POSTGRES_PASSWORD: wowdash
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wowdash -d wowdash"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - wow-dashboard-postgres-dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wow-dashboard-redis-dev
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - wow-dashboard-redis-dev:/data

volumes:
  wow-dashboard-postgres-dev:
  wow-dashboard-redis-dev:
