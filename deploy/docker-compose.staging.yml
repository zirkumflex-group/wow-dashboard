name: wow-dashboard-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wowdash
      POSTGRES_USER: wowdash
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wowdash -d wowdash"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: migrate
    restart: "no"
    env_file:
      - ${SERVICE_ENV_FILE:-.env.staging}
    environment:
      DATABASE_URL: postgres://wowdash:${POSTGRES_PASSWORD}@postgres:5432/wowdash
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: runtime-api
    restart: unless-stopped
    env_file:
      - ${SERVICE_ENV_FILE:-.env.staging}
    environment:
      DATABASE_URL: postgres://wowdash:${POSTGRES_PASSWORD}@postgres:5432/wowdash
      REDIS_URL: redis://redis:6379
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "${API_HOST_BIND:-127.0.0.1}:${API_HOST_PORT:-3100}:3000"
    networks:
      default:
        aliases:
          - wow-dashboard-staging-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT ?? 3000) + '/readyz').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      target: runtime-worker
    restart: unless-stopped
    env_file:
      - ${SERVICE_ENV_FILE:-.env.staging}
    environment:
      DATABASE_URL: postgres://wowdash:${POSTGRES_PASSWORD}@postgres:5432/wowdash
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        VITE_API_URL: ${API_URL}
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
    ports:
      - "${WEB_HOST_BIND:-127.0.0.1}:${WEB_HOST_PORT:-3101}:3001"
    networks:
      default:
        aliases:
          - wow-dashboard-staging-web
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT ?? 3001) + '/robots.txt').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  default:
    name: wow-dashboard-staging

volumes:
  postgres-data:
    name: wow-dashboard-staging-postgres
  redis-data:
    name: wow-dashboard-staging-redis
